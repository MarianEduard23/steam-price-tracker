name: CSFloat Price Tracker
on:
  schedule:
    - cron: '0 1 * * *'   # 03:00 UTC+2 zilnic
    - cron: '0 8 * * *'   # 10:00 UTC+2 zilnic
    - cron: '0 17 * * *'  # 19:00 UTC+2 zilnic
  workflow_dispatch:       # permite și rulare manuală

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl google-auth google-auth-oauthlib google-api-python-client

      - name: Restore history
        uses: actions/cache@v3
        with:
          path: |
            csfloat_price_history.json
            gdrive_token.pickle
          key: csfloat-data-${{ github.run_id }}
          restore-keys: csfloat-data-

      - name: Run script
        run: python csfloat_price_calculator.py
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}

      - name: Save history
        uses: actions/cache@v3
        with:
          path: |
            csfloat_price_history.json
            gdrive_token.pickle
          key: csfloat-data-${{ github.run_id }}
